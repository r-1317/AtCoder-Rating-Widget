<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="../widget.css" />
    <title>AtCoder Rating Widget - tourist</title>
  </head>
  <body>
    <div class="acrw-widget" role="group" aria-label="AtCoder rating widget">
      <a class="acrw-link-all" href="https://atcoder.jp/users/tourist" target="_blank" rel="noopener noreferrer" aria-label="Open AtCoder user page"></a>

			<div class="acrw-header acrw-rating--red">tourist</div>

      <div class="acrw-ratings">
        <div class="acrw-block" aria-label="Algorithm rating">
          <span class="acrw-label">Algorithm</span>
          <span class="acrw-rating acrw-rating--red">3782</span>
        </div>

        <a class="acrw-heur-link" href="https://atcoder.jp/users/tourist?contestType=heuristic" target="_blank" rel="noopener noreferrer" aria-label="Open AtCoder heuristic page">
          <div class="acrw-block" aria-label="Heuristic rating">
            <span class="acrw-label">Heuristic</span>
            <span class="acrw-rating acrw-rating--yellow">2223</span>
          </div>
        </a>
      </div>

      <div class="acrw-updated">Updated: 2026-03-01 09:40 JST</div>
    </div>
  </body>
</html>
