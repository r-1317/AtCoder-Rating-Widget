<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="../widget.css" />
    <title>AtCoder Rating Widget - chokudai</title>
  </head>
  <body>
    <div class="acrw-widget" role="group" aria-label="AtCoder rating widget">

			<a class="acrw-user-link" href="https://atcoder.jp/users/chokudai" target="_blank" rel="noopener noreferrer" aria-label="Open AtCoder user page">
				<div class="acrw-header acrw-rating--red">chokudai</div>
			</a>

      <div class="acrw-ratings">

			<a class="acrw-alg-link" href="https://atcoder.jp/users/chokudai" target="_blank" rel="noopener noreferrer" aria-label="Open AtCoder algorithm page">
				<div class="acrw-block" aria-label="Algorithm rating">
				  <span class="acrw-label">Algorithm</span>
				  <span class="acrw-rating acrw-rating--red">3031</span>
				</div>
			</a>

        <a class="acrw-heur-link" href="https://atcoder.jp/users/chokudai?contestType=heuristic" target="_blank" rel="noopener noreferrer" aria-label="Open AtCoder heuristic page">
          <div class="acrw-block" aria-label="Heuristic rating">
            <span class="acrw-label">Heuristic</span>
            <span class="acrw-rating acrw-rating--red">3022</span>
          </div>
        </a>
      </div>


			<div class="acrw-updated">
				<span>更新日時: 2026-03-09 04:00 JST</span>
				<a class="acrw-about" href="https://github.com/r-1317/AtCoder-Rating-Widget" target="_blank" rel="noopener noreferrer">About</a>
			</div>
    </div>
  </body>
</html>
