name: Generate AtCoder rating widgets

on:
  schedule:
    - cron: "37 18 * * 0,6" # UTCの土日(0=Sun, 6=Sat)のみ / 日本時間だと日・月の03:37
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate widgets
        run: python generate_widgets.py

      - name: Commit and push (if changed)
        run: |
          set -euo pipefail
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A widgets
            git commit -m "Update widgets"
            git push
          else
            echo "No changes"
          fi
